name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: corepack enable
      - run: npm ci
      - run: pnpm -C frontend install --frozen-lockfile
      - run: npm --prefix backend ci
      - run: npm run check:fast
